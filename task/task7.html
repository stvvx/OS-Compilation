<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Activities ITOS220-T</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue:      #0078d4;
      --blue-lt:   #2ea8ff;
      --cyan:      #00d4ff;
      --accent:    #7b5cf6;
      --navy:      #030912;
      --navy-mid:  #060e1d;
      --navy-card: rgba(6,16,38,0.82);
      --navy-card2:rgba(4,12,28,0.92);
      --glass-bd:  rgba(255,255,255,0.07);
      --glass-bd2: rgba(0,180,255,0.18);
      --text:      #e8f0ff;
      --text-dim:  #7a99c0;
      --text-mute: #3a5070;
      --glow-blue: 0 0 50px rgba(0,120,212,0.45);
      --glow-cyan: 0 0 30px rgba(0,212,255,0.3);
      --glow-acc:  0 0 30px rgba(123,92,246,0.3);
      --r-card:    20px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family:'DM Sans',sans-serif;
      background:var(--navy);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    /*  BACKGROUND  */
    #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .bg-base {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 100% 80% at 50% -10%, rgba(0,90,190,0.28) 0%, transparent 65%),
        radial-gradient(ellipse 55%  55% at 92%  85%, rgba(0,200,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 45%  65% at  8%  65%, rgba(0,50,140,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 30%  30% at 50%  50%, rgba(123,92,246,0.04) 0%, transparent 60%),
        linear-gradient(185deg,#030912 0%,#060e1d 40%,#030810 100%);
      pointer-events:none;
    }

    .bg-scan {
      position:fixed; inset:0; z-index:0;
      background-image:repeating-linear-gradient(
        0deg,transparent,transparent 3px,
        rgba(0,100,200,0.015) 3px,rgba(0,100,200,0.015) 4px
      );
      pointer-events:none;
    }

    .bg-grid {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,120,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,120,212,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 70%);
    }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      height:70px; display:flex; align-items:center; justify-content:space-between;
      padding:0 52px;
      background:rgba(3,9,18,0.88);
      backdrop-filter:blur(32px) saturate(1.6);
      border-bottom:1px solid rgba(0,180,255,0.08);
    }
    nav::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,200,255,0.5) 35%,rgba(0,120,212,0.5) 65%,transparent);
    }

    .nav-logo { display:flex; align-items:center; gap:14px; text-decoration:none; }

    .win-panes {
      width:28px; height:28px;
      display:grid; grid-template-columns:1fr 1fr; gap:3px;
      animation:wlogo-pulse 4s ease-in-out infinite;
    }
    @keyframes wlogo-pulse {
      0%,100%{filter:drop-shadow(0 0 4px rgba(0,180,255,0.4))}
      50%     {filter:drop-shadow(0 0 14px rgba(0,180,255,1))}
    }
    .win-panes span { border-radius:2px; display:block; }
    .win-panes span:nth-child(1){background:#0095f0}
    .win-panes span:nth-child(2){background:#0075d0;opacity:.85}
    .win-panes span:nth-child(3){background:#0075d0;opacity:.85}
    .win-panes span:nth-child(4){background:#005ab0;opacity:.7}

    .nav-brand {
      font-family:'Syne',sans-serif; font-weight:800; font-size:15px;
      letter-spacing:1.8px; text-transform:uppercase; color:#fff;
    }
    .nav-brand span { color:var(--cyan); }

    .nav-links { display:flex; gap:2px; list-style:none; }
    .nav-links a {
      display:inline-flex; align-items:center; gap:7px;
      padding:9px 22px;
      font-family:'Syne',sans-serif; font-size:12.5px; font-weight:600;
      letter-spacing:0.8px; text-transform:uppercase;
      color:var(--text-dim); text-decoration:none; border-radius:8px;
      transition:color .2s,background .2s;
    }
    .nav-links a .dot {
      width:5px; height:5px; border-radius:50%; background:var(--cyan);
      opacity:0; transform:scale(0); transition:all .2s;
    }
    .nav-links a:hover       { color:#fff; background:rgba(0,180,255,0.08); }
    .nav-links a.active      { color:var(--cyan); background:rgba(0,180,255,0.08); }
    .nav-links a.active .dot { opacity:1; transform:scale(1); }

    .nav-links li { position:relative; }

    .nav-caret {
      font-size:11px;
      line-height:1;
      opacity:.75;
      transition:transform .2s ease;
    }

    .has-dropdown:hover .nav-caret,
    .has-dropdown:focus-within .nav-caret {
      transform:rotate(180deg);
    }

    .nav-submenu {
      list-style:none;
      position:absolute;
      top:100%;
      left:0;
      min-width:230px;
      padding:8px;
      border-radius:10px;
      border:1px solid rgba(0,180,255,0.16);
      background:rgba(5,14,34,0.96);
      box-shadow:0 16px 36px rgba(0,0,0,0.45);
      backdrop-filter:blur(12px);
      display:none;
      z-index:230;
    }

    .has-dropdown:hover .nav-submenu,
    .has-dropdown:focus-within .nav-submenu {
      display:block;
    }

    .nav-submenu a {
      display:block;
      padding:8px 10px;
      border-radius:7px;
      font-family:'Space Mono',monospace;
      font-size:10px;
      letter-spacing:.8px;
      text-transform:none;
      color:var(--text-dim);
      text-decoration:none;
    }

    .nav-submenu a:hover,
    .nav-submenu a:focus-visible {
      background:rgba(0,180,255,0.14);
      color:#fff;
      outline:none;
    }

    /*  PAGE WRAPPER  */
    .page {
      position:relative; z-index:1;
      padding:110px 60px 90px;
      max-width:1340px; margin:0 auto;
    }

    /*  PAGE HERO  */
    .page-hero {
      text-align:center; padding:28px 0 70px; position:relative;
    }
    .page-hero::before {
      content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%);
      width:760px; height:420px;
      background:radial-gradient(ellipse,rgba(0,100,200,0.22) 0%,transparent 68%);
      pointer-events:none; z-index:0;
    }

    .page-eyebrow {
      display:inline-flex; align-items:center; gap:10px;
      padding:7px 22px;
      border:1px solid rgba(0,212,255,0.28);
      border-radius:100px;
      background:rgba(0,212,255,0.06);
      font-family:'Space Mono',monospace; font-size:11px;
      letter-spacing:2.5px; color:var(--cyan); text-transform:uppercase;
      margin-bottom:28px; position:relative; z-index:1;
      backdrop-filter:blur(10px);
    }
    .page-eyebrow::before {
      content:''; width:6px; height:6px; border-radius:50%;
      background:var(--cyan); animation:blink 1.8s ease-in-out infinite;
      box-shadow:0 0 8px var(--cyan);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .page-hero h1 {
      font-family:'Syne',sans-serif;
      font-size:clamp(40px,6.5vw,82px); font-weight:800;
      line-height:1.04; letter-spacing:-2px;
      position:relative; z-index:1; margin-bottom:20px;
    }
    .page-hero h1 .g1 {
      display:block;
      background:linear-gradient(110deg,#fff 0%,#c8e4ff 40%,var(--cyan) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .page-hero h1 .g2 {
      display:block; font-size:.42em; font-weight:600;
      letter-spacing:5px; margin-top:12px;
      color:var(--text-dim); -webkit-text-fill-color:var(--text-dim);
    }
    .page-hero p {
      font-size:16px; color:var(--text-dim);
      max-width:520px; margin:0 auto 8px;
      line-height:1.8; font-weight:300;
      position:relative; z-index:1;
    }
    .page-hero .student-tag {
      display:inline-flex; align-items:center; gap:8px;
      font-family:'Space Mono',monospace; font-size:12px;
      color:var(--text-mute); letter-spacing:1px;
      position:relative; z-index:1;
    }
    .page-hero .student-tag::before,
    .page-hero .student-tag::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(90deg,transparent,var(--text-mute));
    }
    .page-hero .student-tag::after {
      background:linear-gradient(90deg,var(--text-mute),transparent);
    }

    /*  STATS BAR  */
    .stats-bar {
      display:flex; align-items:center; justify-content:center; gap:0;
      background:var(--navy-card2);
      border:1px solid rgba(0,180,255,0.14);
      border-radius:20px;
      overflow:hidden;
      margin-bottom:60px;
      position:relative;
    }
    .stats-bar::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),var(--blue),transparent);
    }
    .stats-bar::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(0,180,255,0.15),transparent);
    }
    .stat-item {
      flex:1; text-align:center; padding:32px 20px;
      border-right:1px solid rgba(255,255,255,0.05);
      position:relative;
      transition:background .3s;
    }
    .stat-item:last-child { border-right:none; }
    .stat-item:hover { background:rgba(0,120,212,0.06); }
    .stat-num {
      font-family:'Space Mono',monospace; font-size:38px; font-weight:700;
      background:linear-gradient(135deg,var(--cyan),var(--blue-lt));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      display:block; line-height:1;
    }
    .stat-lbl {
      font-family:'Syne',sans-serif; font-size:11px; font-weight:600;
      letter-spacing:2px; text-transform:uppercase; color:var(--text-mute); margin-top:8px;
      display:block;
    }
    .stat-sub {
      font-size:11px; color:rgba(0,212,255,0.4);
      font-family:'Space Mono',monospace; margin-top:4px;
      letter-spacing:1px;
    }

    /*  PART HEADER  */
    .part-section { margin-bottom:90px; }

    .part-header {
      display:flex; align-items:center; gap:20px;
      margin-bottom:28px;
    }
    .part-num-badge {
      width:48px; height:48px; flex-shrink:0;
      background:linear-gradient(135deg,rgba(0,120,212,0.25),rgba(0,212,255,0.1));
      border:1px solid rgba(0,212,255,0.25);
      border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--cyan);
      backdrop-filter:blur(10px);
    }
    .part-title-group { flex:1; }
    .part-pill {
      display:inline-flex; align-items:center; gap:8px;
      padding:5px 14px;
      border:1px solid rgba(0,212,255,0.2);
      border-radius:100px;
      background:rgba(0,212,255,0.06);
      font-family:'Space Mono',monospace; font-size:9px;
      letter-spacing:2.5px; color:var(--cyan); text-transform:uppercase;
      margin-bottom:6px;
    }
    .part-pill::before {
      content:''; width:5px; height:5px; border-radius:50%;
      background:var(--cyan); animation:blink 1.8s ease-in-out infinite;
      box-shadow:0 0 6px var(--cyan);
    }
    .part-name {
      font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
      color:#fff; letter-spacing:-.5px;
    }
    .part-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(0,180,255,0.2),transparent); }

    /*  DESCRIPTION BOX - enhanced  */
    .desc-box {
      background:var(--navy-card2);
      border:1px solid rgba(0,180,255,0.13);
      border-radius:var(--r-card);
      padding:0;
      margin-bottom:28px;
      position:relative; overflow:hidden;
    }
    .desc-box::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:linear-gradient(180deg,var(--blue),var(--cyan));
    }
    .desc-box-inner {
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:stretch;
      gap:0;
    }
    .desc-icon-wrap {
      padding:28px 24px;
      display:flex; align-items:flex-start; justify-content:center;
      font-size:32px; flex-shrink:0;
      border-right:1px solid rgba(255,255,255,0.04);
    }
    .desc-body-wrap { padding:28px 28px; }
    .desc-body-wrap h4 {
      font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
      color:var(--cyan); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px;
    }
    .desc-body-wrap .desc-main {
      font-size:15px; color:var(--text); line-height:1.8; font-weight:300;
      margin-bottom:14px;
    }
    .desc-body-wrap .desc-extra {
      font-size:13.5px; color:var(--text-dim); line-height:1.75; font-weight:300;
      border-top:1px solid rgba(255,255,255,0.05); padding-top:14px;
    }
    .desc-tags {
      padding:28px 24px;
      display:flex; flex-direction:column; align-items:flex-end; justify-content:flex-start;
      gap:6px; flex-shrink:0; border-left:1px solid rgba(255,255,255,0.04);
    }
    .desc-tag {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 12px;
      background:rgba(0,120,212,0.12);
      border:1px solid rgba(0,120,212,0.2);
      border-radius:100px;
      font-family:'Space Mono',monospace; font-size:9px;
      letter-spacing:1.5px; color:var(--blue-lt); text-transform:uppercase;
      white-space:nowrap;
    }

    /*  VIDEO GRID - one card per row, full width  */
    .video-grid {
      display:flex;
      flex-direction:column;
      gap:22px;
      margin-bottom:0;
    }

    /* Card: horizontal - video LEFT, description RIGHT */
    .video-card {
      background:var(--navy-card);
      border:1px solid var(--glass-bd);
      border-radius:var(--r-card);
      overflow:hidden;
      display:flex;
      flex-direction:row;          /*  side by side */
      min-height:290px;
      position:relative;
      transition:transform .38s cubic-bezier(.22,1,.36,1),border-color .3s,box-shadow .3s;
      opacity:0; transform:translateY(30px);
    }
    .video-card.revealed {
      animation:card-reveal .55s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes card-reveal { to{opacity:1;transform:translateY(0)} }

    .video-card:hover {
      transform:translateY(-6px);
      border-color:rgba(0,200,255,0.38);
      box-shadow:0 28px 60px rgba(0,0,0,0.55),var(--glow-blue);
    }

    /* Glowing top accent bar via ::before */
    .video-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--blue),var(--cyan));
      opacity:0; transition:opacity .3s; z-index:2;
    }
    .video-card:hover::before { opacity:1; }

    /* Card accent bar div - hidden in row mode (keep for compat) */
    .card-accent-bar { display:none; }

    /* === VIDEO LEFT HALF === */
    .video-frame {
      flex: 0 0 50%;              /* exactly half the card width */
      position:relative;
      background:#000;
      /* height is driven by the card's min-height */
    }
    .video-frame iframe {
      position:absolute; top:0; left:0; width:100%; height:100%; border:none;
    }
    .video-thumb-btn {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      padding:0;
      background:#000;
      cursor:pointer;
      z-index:3;
    }
    .video-thumb-btn img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:.9;
    }
    .video-thumb-play {
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:74px;
      height:52px;
      border-radius:12px;
      background:rgba(230,0,0,.92);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }
    .video-thumb-play::before {
      content:'';
      border-left:18px solid #fff;
      border-top:11px solid transparent;
      border-bottom:11px solid transparent;
      margin-left:3px;
    }
    .video-frame::after {
      content:''; position:absolute; inset:0; z-index:1;
      background:linear-gradient(135deg,rgba(0,100,200,0.1) 0%,transparent 55%);
      pointer-events:none;
    }
    /* vertical separator */
    .video-frame::before {
      content:''; position:absolute; top:0; right:0; bottom:0; width:1px; z-index:2;
      background:linear-gradient(180deg,transparent,rgba(0,200,255,0.2) 40%,rgba(0,200,255,0.2) 60%,transparent);
    }

    /* === DESCRIPTION RIGHT HALF === */
    .video-body {
      flex:1;                      /* takes the other half */
      display:flex;
      flex-direction:column;
      padding:26px 28px 24px;
      gap:11px;
      min-height:0;
      overflow:hidden;
    }

    /* responsive: stack on narrow screens */
    @media(max-width:760px){
      .video-card { flex-direction:column; min-height:unset; }
      .video-frame { flex:none; width:100%; padding-bottom:56.25%; }
      .video-frame::before { display:none; }
    }

    .video-index {
      font-family:'Space Mono',monospace; font-size:9px;
      letter-spacing:2.5px; color:var(--cyan); text-transform:uppercase;
    }

    .video-title {
      font-family:'Syne',sans-serif; font-size:15.5px; font-weight:800;
      color:#fff; line-height:1.3;
    }

    /* Tags row */
    .video-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .video-tag {
      padding:3px 10px;
      background:rgba(0,100,200,0.15);
      border:1px solid rgba(0,150,230,0.2);
      border-radius:100px;
      font-family:'Space Mono',monospace; font-size:8.5px;
      letter-spacing:1.2px; color:var(--blue-lt); text-transform:uppercase;
    }

    .video-desc {
      font-size:13px; color:var(--text-dim); line-height:1.7; font-weight:300;
      flex:1;                  /* pushes footer to bottom */
    }

    /* Divider */
    .video-divider {
      height:1px;
      background:linear-gradient(90deg,rgba(0,180,255,0.15),transparent);
    }

    /* What you'll learn section */
    .video-learn-title {
      font-family:'Space Mono',monospace; font-size:8.5px;
      letter-spacing:2px; text-transform:uppercase; color:var(--cyan);
      opacity:.7;
    }
    .video-learn-list {
      display:flex; flex-direction:column; gap:5px;
      list-style:none;
    }
    .video-learn-list li {
      display:flex; align-items:flex-start; gap:8px;
      font-size:12px; color:var(--text-dim); line-height:1.5; font-weight:300;
    }
    .video-learn-list li::before {
      content:''; color:var(--cyan); font-size:14px; line-height:1.2; flex-shrink:0;
    }

    .video-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:4px;
    }
    .video-duration {
      font-family:'Space Mono',monospace; font-size:10px;
      color:var(--text-mute); letter-spacing:1px;
    }

    .watch-btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 22px;
      background:linear-gradient(135deg,var(--blue),#0058a8);
      color:#fff; text-decoration:none;
      border-radius:10px;
      font-family:'Syne',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:.5px; text-transform:uppercase;
      transition:all .25s;
      box-shadow:0 4px 18px rgba(0,120,212,0.3);
    }
    .watch-btn:hover {
      transform:translateY(-2px);
      box-shadow:0 10px 30px rgba(0,120,212,0.55);
      background:linear-gradient(135deg,var(--blue-lt),var(--blue));
    }
    .watch-btn svg {
      width:10px; height:10px; fill:#fff;
    }

    /*  PROGRESS BAR  */
    .progress-track {
      display:flex; align-items:center; gap:3px;
      margin-bottom:60px;
    }
    .progress-step {
      flex:1; height:3px; border-radius:2px;
      background:rgba(0,120,212,0.15);
      position:relative; overflow:hidden;
      transition:all .3s;
    }
    .progress-step.done { background:linear-gradient(90deg,var(--blue),var(--cyan)); }
    .progress-step .p-label {
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      font-family:'Space Mono',monospace; font-size:8px; color:var(--text-mute);
      white-space:nowrap; letter-spacing:1px;
      opacity:0; transition:opacity .2s;
    }
    .progress-step:hover .p-label { opacity:1; }
    .progress-step.done .p-label { color:var(--cyan); }

    /*  FOOTER  */
    footer {
      position:relative; z-index:1;
      border-top:1px solid rgba(255,255,255,0.05);
      padding:28px 60px;
      display:flex; align-items:center; justify-content:space-between;

function getVideoId(url) {
  const raw = String(url || '').trim();
  if (!raw) return null;
  try {
    const u = new URL(raw);
    if (u.hostname.includes('youtu.be')) {
      const id = u.pathname.split('/').filter(Boolean)[0];
      return id && id.length === 11 ? id : null;
    }
    if (u.searchParams.get('v')) {
      const id = u.searchParams.get('v');
      return id && id.length === 11 ? id : null;
    }
    const parts = u.pathname.split('/').filter(Boolean);
    const marker = parts.findIndex(p => p === 'embed' || p === 'shorts' || p === 'v');
    if (marker !== -1 && parts[marker + 1]) {
      const id = parts[marker + 1];
      return id.length === 11 ? id : null;
    }
  } catch (e) {
    const m = raw.match(/(?:youtu\.be\/|v\/|watch\?v=|embed\/|shorts\/)([^#&?]{11})/);
    return m ? m[1] : null;
  }
  return null;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderParts() {
  const container = document.getElementById('partsContainer');

  let totalVideos = visibleCaseParts.reduce((acc, p) => acc + p.videos.length, 0);
  const totalCountEl = document.getElementById('totalCount');
  const partCountEl = document.getElementById('partCount');
  if (totalCountEl) totalCountEl.textContent = totalVideos;
  if (partCountEl) partCountEl.textContent = visibleCaseParts.length;

  container.innerHTML = visibleCaseParts.map((part) => {
    const tagsHtml = (part.tags || []).map(t => `<span class="desc-tag">${t}</span>`).join('');

    const videosHtml = part.videos.map((vid, vi) => {
      const id = getVideoId(vid.url);
      const vtags = (vid.tags || []).map(t => `<span class="video-tag">${t}</span>`).join('');
      const kpHtml = (vid.keyPoints || []).map(k => `<li>${esc(k)}</li>`).join('');
      const frameHtml = id
        ? `<button class="video-thumb-btn" type="button" data-video-id="${id}" data-video-title="${esc(vid.title)}" aria-label="Play ${esc(vid.title)}">
             <img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="${esc(vid.title)} thumbnail" loading="lazy" />
             <span class="video-thumb-play"></span>
           </button>`
        : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:18px;text-align:center;color:#9fb7d9;font-size:14px;line-height:1.5;">
             Invalid YouTube link for this part. Please update the video URL.
           </div>`;

      return `
        <div class="video-card">
          <div class="card-accent-bar"></div>
          <div class="video-frame">
            ${frameHtml}
          </div>
          <div class="video-body">
            <div class="video-index">${part.part}  Video ${vi + 1}</div>
            <div class="video-title">${esc(vid.title)}</div>
            ${vtags ? `<div class="video-tags">${vtags}</div>` : ''}
            <div class="video-desc">${esc(vid.description)}</div>
            ${kpHtml ? `
              <div class="video-divider"></div>
              <div class="video-learn-title">Key Topics</div>
              <ul class="video-learn-list">${kpHtml}</ul>
            ` : ''}
            <div class="video-footer">
              <span class="video-duration">${vid.duration || ''}</span>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="part-section" id="part-${part.partId}">
        <div class="part-header">
          <div class="part-num-badge">P${part.partId}</div>
          <div class="part-title-group">
            <div class="part-pill">${part.part}</div>
            <div class="part-name">${part.title}</div>
          </div>
          <div class="part-line"></div>
        </div>

        <div class="desc-box">
          <div class="desc-box-inner">
            <div class="desc-icon-wrap">${part.icon || "[*]"}</div>
            <div class="desc-body-wrap">
              <h4>${part.part} - ${part.title}</h4>
              <div class="desc-main">${esc(part.description)}</div>
              <div class="desc-extra">${esc(part.details)}</div>
            </div>
            <div class="desc-tags">${tagsHtml}</div>
          </div>
        </div>

        <div class="video-grid">
          ${videosHtml}
        </div>
      </div>
    `;
  }).join('');

  /* Staggered reveal */
  document.querySelectorAll('.video-card').forEach((card, i) => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('revealed'), (i % 3) * 110);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.06 });
    obs.observe(card);
  });

  // Play video inline inside the card when thumbnail is clicked.
  container.querySelectorAll('.video-thumb-btn').forEach((btn) => {
    btn.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      const id = btn.getAttribute('data-video-id');
      const title = btn.getAttribute('data-video-title') || 'YouTube video';
      const frame = btn.closest('.video-frame');
      if (!id || !frame) return;

      const params = new URLSearchParams({
        autoplay: '1',
        rel: '0',
        modestbranding: '1',
        playsinline: '1'
      });

      // Only send origin when served via http(s); local file preview can break embeds with origin=null.
      if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
        params.set('origin', window.location.origin);
      }

      const src = `https://www.youtube.com/embed/${id}?${params.toString()}`;
      frame.innerHTML = `<iframe src="${src}"
                          title="${title}"
              referrerpolicy="strict-origin-when-cross-origin"
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                          allowfullscreen loading="eager"></iframe>`;
    });
  });
}

(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function Particle() { this.reset(); }
  Particle.prototype.reset = function () {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.r  = Math.random() * 1.2 + 0.2;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.a  = Math.random() * 0.4 + 0.08;
    this.color = Math.random() > 0.5 ? '0,120,212' : '0,200,255';
  };
  Particle.prototype.update = function () {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
  };
  Particle.prototype.draw = function () {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.a})`;
    ctx.fill();
  };

  function drawLines() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < 110) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0,140,220,${0.05 * (1 - d / 110)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    drawLines();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  resize();
  particles = Array.from({ length: 100 }, () => new Particle());
  loop();
})();

document.addEventListener('DOMContentLoaded', () => {
  renderProgress();
  renderParts();
});

function initDropdownMenus() {
  const dropdowns = document.querySelectorAll('.has-dropdown');
  if (!dropdowns.length) return;

  dropdowns.forEach((dd) => {
    const caret = dd.querySelector('.nav-caret');
    if (!caret) return;

    caret.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();

      const shouldOpen = !dd.classList.contains('open');
      dropdowns.forEach((item) => item.classList.remove('open'));
      if (shouldOpen) dd.classList.add('open');
    });
  });

  document.addEventListener('click', (event) => {
    if (!event.target.closest('.has-dropdown')) {
      dropdowns.forEach((item) => item.classList.remove('open'));
    }
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initDropdownMenus);
} else {
  initDropdownMenus();
}
</script>
</body>
</html>
